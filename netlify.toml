[build]
  command = "python scripts/netlify-build.py"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.12"
  SERVE_FRONTEND = "false"
  DATABASE_URL = "sqlite:////tmp/mola_sistemi.db"

[functions]
  directory = "netlify/functions"
  included_files = ["app/**"]

[functions."api"]
  timeout = 26

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
